<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>تدقيق الخصومات — مباشر من HubSpot</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
  background: #f7f7f5; color: #1f2937; margin: 0; padding: 20px;
  line-height: 1.6;
}
.wrap { max-width: 900px; margin: 0 auto; }
.head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.title { font-size:19px; font-weight:600; margin:0; }
.sub { font-size:12px; color:#6b7280; margin:2px 0 0; }
.badge-src { font-size:12px; color:#185fa5; background:#e6f1fb; padding:4px 12px; border-radius:8px; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
.card { background:#fff; border:1px solid #eae8e2; border-radius:12px; padding:14px 16px; }
.card .lbl { font-size:13px; color:#6b7280; margin:0 0 4px; }
.card .val { font-size:26px; font-weight:600; margin:0; }
.g { color:#0f6e56; } .r { color:#a32d2d; } .a { color:#185fa5; }
.row { background:#fff; border:1px solid #eae8e2; border-radius:12px; padding:12px 16px; margin-bottom:10px; }
.row.flag { border-color:#e6a8a8; background:#fdf5f5; }
.row-top { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.name { font-size:15px; font-weight:600; }
.stage { font-size:12px; color:#6b7280; }
.pill { font-size:12px; padding:3px 10px; border-radius:8px; }
.pill.ok { background:#e1f5ee; color:#0f6e56; }
.pill.no { background:#fcebeb; color:#a32d2d; }
.pill.warn { background:#faeeda; color:#854f0b; }
.fields { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.f { background:#f7f7f5; border-radius:8px; padding:6px 10px; }
.f.miss { outline:1px solid #e6a8a8; background:#fdf5f5; }
.f .fl { font-size:11px; color:#9ca3af; margin:0; }
.f .fv { font-size:14px; font-weight:600; margin:0; }
.note-saved { font-size:12px; color:#374151; border-right:3px solid #378add; background:#e6f1fb; padding:6px 10px; border-radius:0 6px 6px 0; margin-bottom:8px; }
.note-row { display:flex; gap:6px; }
input, select, button { font-family:inherit; font-size:13px; }
input { flex:1; padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; background:#fff; }
select { padding:6px 8px; border:1px solid #d1d5db; border-radius:8px; background:#fff; }
button { padding:8px 14px; border:1px solid #185fa5; background:#185fa5; color:#fff; border-radius:8px; cursor:pointer; white-space:nowrap; }
button:hover { background:#12508c; }
.loading { text-align:center; color:#6b7280; padding:40px; }
.err { background:#fcebeb; color:#a32d2d; padding:12px 16px; border-radius:10px; }
.sec-title { font-size:14px; font-weight:600; margin:22px 0 10px; display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <p class="title">تدقيق الخصومات — تسجيلات ٢٦/٢٧</p>
      <p class="sub">Enrollment Pipeline · مطابقة خانتَي الخصم · مباشر من HubSpot</p>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <span class="badge-src">● مباشر</span>
      <label style="font-size:12px; color:#6b7280;">المُدقّق:
        <select id="auditor"><option>مها اليمني</option><option>عبدالعزيز النصار</option></select>
      </label>
    </div>
  </div>

  <div id="content"><div class="loading">جارٍ سحب البيانات من HubSpot…</div></div>
</div>

<script>
const PIPELINE = "3389246713";
const TOOL = "mcp__38f967d9-1c24-4ec1-9f8e-1c97e68140ad__search_crm_objects";
const STAGES = {
  "4640337121":"استفسار","4640265450":"مؤهل","4640337122":"موعد محجوز",
  "5647678702":"زيارة الحرم","4640337123":"مقبول","4640337124":"مسجّل",
  "4640337125":"مرفوض","4640337126":"ملغى"
};
const PROPS = ["dealname","dealstage","discount","discount_enrollment","fees","amount","createdate"];

function parsePct(v){
  if(v===undefined||v===null) return null;
  v = String(v).trim();
  if(v==="") return null;
  if(v.endsWith("%")) return parseFloat(v)/100;
  let n = parseFloat(v);
  if(isNaN(n)) return null;
  return n>1 ? n/100 : n;
}
function fmtPct(fr){ if(fr===null) return "—"; return Math.round(fr*1000)/10 + "%"; }
function fmtNum(v){ let n=parseFloat(v); return isNaN(n)?"—":n.toLocaleString("en-US"); }

async function callTool(filters){
  const r = await window.cowork.callMcpTool(TOOL, {
    objectType:"deals",
    filterGroups:[{filters}],
    properties:PROPS,
    limit:200
  });
  if(r.isError) throw new Error(r.content && r.content[0] ? r.content[0].text : "tool error");
  const data = r.structuredContent ?? JSON.parse(r.content[0].text);
  return data.results || [];
}

function reconcile(p){
  const d1 = parsePct(p.discount);            // manual field: نسبة الخصم
  const d2raw = p.discount_enrollment;
  const d2 = (d2raw===undefined) ? null : parsePct(d2raw);
  const has1 = d1!==null && d1>0;
  const has2 = d2!==null && d2>0;
  let status, label, cls;
  if(has1 && has2){
    if(Math.abs(d1-d2) > 0.001){ status="mismatch"; label="تعارض في القيمة"; cls="no"; }
    else { status="ok"; label="متطابق"; cls="ok"; }
  } else if(has1 && !has2){
    status="only1"; label="ناقص — الخانة اليدوية فقط"; cls="no";
  } else if(!has1 && has2){
    status="only2"; label="ناقص — خانة Enrollment فقط"; cls="no";
  } else {
    status="none"; label="بدون خصم"; cls="warn";
  }
  return {d1,d2,has1,has2,status,label,cls};
}

function render(deals){
  const rows = deals.map(d=>({p:d.properties, id:d.id, rc:reconcile(d.properties)}))
    .filter(x=>x.rc.has1||x.rc.has2);
  const total = rows.length;
  const matched = rows.filter(x=>x.rc.status==="ok").length;
  const flagged = rows.filter(x=>x.rc.status==="only1"||x.rc.status==="only2"||x.rc.status==="mismatch");
  rows.sort((a,b)=>{
    const rank = s => (s==="only1"||s==="only2"||s==="mismatch")?0:1;
    return rank(a.rc.status)-rank(b.rc.status);
  });
  const notes = JSON.parse(localStorage.getItem("discNotesLive")||"{}");
  let totalDiscount = 0;
  rows.forEach(x=>{ const fr=x.rc.has2?x.rc.d2:(x.rc.has1?x.rc.d1:0); const base=parseFloat(x.p.fees||x.p.amount||0)||0; totalDiscount += fr*base; });

  let html = `<div class="cards">
    <div class="card"><p class="lbl">عليهم خصم</p><p class="val">${total}</p></div>
    <div class="card"><p class="lbl">متطابق</p><p class="val g">${matched}</p></div>
    <div class="card"><p class="lbl">ناقص / تعارض</p><p class="val r">${flagged.length}</p></div>
    <div class="card"><p class="lbl">إجمالي الخصم</p><p class="val">${Math.round(totalDiscount).toLocaleString("en-US")}<span style="font-size:12px">ر.س</span></p></div>
  </div>`;

  if(flagged.length){
    html += `<p class="sec-title r">⚠ يحتاج تدقيقك المباشر (${flagged.length})</p>`;
  }
  html += rows.map((x,i)=>rowHtml(x,i,notes)).join("");
  document.getElementById("content").innerHTML = html;
}

function rowHtml(x,i,notes){
  const p=x.p, rc=x.rc, flag=(rc.status!=="ok");
  const stage = STAGES[p.dealstage]||"—";
  const saved = notes[x.id];
  const miss1 = rc.status==="only2";
  const miss2 = rc.status==="only1";
  return `<div class="row ${flag?'flag':''}">
    <div class="row-top">
      <span class="name">${p.dealname||"—"} <span class="stage">· ${stage}</span></span>
      <span class="pill ${rc.cls}">${rc.label}</span>
    </div>
    <div class="fields">
      <div class="f ${miss1?'miss':''}"><p class="fl">نسبة الخصم (يدوي)</p><p class="fv">${p.discount!==undefined&&p.discount!==""?p.discount:"فارغة"}</p></div>
      <div class="f ${miss2?'miss':''}"><p class="fl">Enrollment %</p><p class="fv">${p.discount_enrollment!==undefined&&p.discount_enrollment!==""?fmtPct(parsePct(p.discount_enrollment)):"فارغة"}</p></div>
      <div class="f"><p class="fl">الرسوم</p><p class="fv">${fmtNum(p.fees||p.amount)} ر.س</p></div>
    </div>
    <div class="note-saved" id="sv-${i}" style="${saved?'':'display:none'}">📝 ${saved?saved.text+' — '+saved.by+' · '+saved.at:''}</div>
    <div class="note-row">
      <input id="in-${i}" placeholder="سبب التدقيق / ملاحظة…" value="${saved?saved.text.replace(/"/g,'&quot;'):''}" />
      <button onclick="saveNote('${x.id}',${i})">حفظ</button>
    </div>
  </div>`;
}

function saveNote(id,i){
  const val=document.getElementById("in-"+i).value.trim();
  if(!val) return;
  const by=document.getElementById("auditor").value;
  const at=new Date().toLocaleString("ar-SA",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
  const n=JSON.parse(localStorage.getItem("discNotesLive")||"{}");
  n[id]={text:val,by,at};
  localStorage.setItem("discNotesLive",JSON.stringify(n));
  const el=document.getElementById("sv-"+i);
  el.style.display="block";
  el.textContent="📝 "+val+" — "+by+" · "+at;
}

async function load(){
  try{
    const a = await callTool([
      {propertyName:"pipeline",operator:"EQ",value:PIPELINE},
      {propertyName:"discount_enrollment",operator:"GT",value:"0"}
    ]);
    const b = await callTool([
      {propertyName:"pipeline",operator:"EQ",value:PIPELINE},
      {propertyName:"discount",operator:"HAS_PROPERTY"},
      {propertyName:"discount_enrollment",operator:"NOT_HAS_PROPERTY"}
    ]);
    const map = {};
    [...a,...b].forEach(d=>{ map[d.id]=d; });
    render(Object.values(map));
  }catch(e){
    document.getElementById("content").innerHTML =
      '<div class="err">تعذّر سحب البيانات من HubSpot: '+e.message+'</div>';
  }
}
load();
</script>
</body>
</html>
